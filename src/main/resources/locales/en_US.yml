# Every value is parsed as Adventure MiniMessage. Dynamic player data is inserted as an unparsed placeholder.
error:
  not-ready: "<red>HeadHunting is still starting. Try again in a moment.</red>"
  no-permission: "<red>You do not have permission to do that.</red>"
  player-only: "<red>This command can only be used by a player.</red>"
  internal: "<red>The operation could not be completed. An administrator can check the server log.</red>"
  invalid-number: "<red><value> is not a valid number.</red>"
  invalid-player: "<red>Player <player> was not found.</red>"
  invalid-head: "<red>Unknown head type: <head>.</red>"
  invalid-locale: "<red>Unknown language. Available languages: <locales>.</red>"
  inventory-full: "<red>Your inventory is full. The reward was dropped at your feet.</red>"
  busy: "<red>A HeadHunting inventory transaction is already in progress.</red>"
  world-blocked: "<red>HeadHunting is disabled in this world.</red>"
  forged-head: "<red>This item is not an authentic HeadHunting head.</red>"
  duplicate-head: "<red>This head batch has already been redeemed or was copied.</red>"
  locked-head: "<red>You must reach level <level> before selling this head.</red>"
  reload-failed: "<red>Reload failed; the previous configuration is still active. See the server log.</red>"

command:
  help: "<gold><bold>HeadHunting</bold></gold><newline><yellow>/headhunt</yellow> <gray>- Open your level menu</gray><newline><yellow>/headhunt sell [hand|all]</yellow> <gray>- Sell authentic heads</gray><newline><yellow>/headhunt exchange</yellow> <gray>- Open Head Exchange</gray><newline><yellow>/headhunt language <locale|auto></yellow> <gray>- Select your language</gray><newline><yellow>/rankup</yellow> <gray>- Advance after completing the current level</gray>"
  usage-language: "<red>Usage: /headhunt language <locale|auto></red>"
  usage-sell: "<red>Usage: /headhunt sell [hand|all]</red>"
  usage-admin-give: "<red>Usage: /headhunt admin give <player> <head> [amount]</red>"
  usage-admin-setlevel: "<red>Usage: /headhunt admin setlevel <player> <level></red>"
  usage-admin-add: "<red>Usage: /headhunt admin <addprogress|addsouls|addbalance> <player> <amount></red>"

profile:
  balance: "<gold>Balance:</gold> <green><amount></green> <dark_gray>|</dark_gray> <aqua>Souls:</aqua> <amount_souls>"
  status: "<gold>Level <level></gold> <gray>(<tier>)</gray> <dark_gray>-</dark_gray> <yellow><progress>/<required></yellow> <gray>progress</gray>"
  completed: "<gold><bold>You completed every HeadHunting level.</bold></gold>"

language:
  changed: "<green>Your HeadHunting language is now <locale>.</green>"
  automatic: "<green>Automatic language detection is enabled. Current language: <locale>.</green>"

drop:
  mob: "<gray><head> dropped an authentic head.</gray>"
  player: "<gold>You claimed <victim>'s head worth <value>.</gold>"
  queue-full: "<red>The head mint queue is full. This drop was skipped to protect server stability.</red>"

sell:
  nothing-hand: "<red>You are not holding an authentic head.</red>"
  nothing-all: "<red>Your inventory contains no sellable authentic heads.</red>"
  preparing: "<gray>Validating <quantity> heads...</gray>"
  success: "<green>Sold <quantity> heads for <value>.</green> <yellow>+<progress> progress</yellow>"
  failed-unchanged: "<red>The sale was cancelled because the selected inventory slots changed.</red>"
  recovery-cancelled: "<yellow>An interrupted head sale was cancelled because its items were still present.</yellow>"
  recovery-finalized: "<yellow>An interrupted head sale was completed and credited.</yellow>"
  sign-created: "<green>HeadHunting sell sign created.</green>"
  sign-line-one: "<gold><bold>[HeadHunt]</bold></gold>"
  sign-line-two: "<green>Sell Heads</green>"

rankup:
  success: "<green><bold>Level up!</bold></green> <gray>You reached level <level>.</gray>"
  completed: "<gold><bold>HeadHunting complete!</bold></gold> <gray>You cleared the final level.</gray>"
  incomplete: "<red>You still need <remaining> progress and all listed kill requirements.</red>"
  insufficient-funds: "<red>Rank-up costs <cost>; your balance is <balance>.</red>"
  changed: "<red>Your level changed while rank-up was being processed. Try again.</red>"
  already-completed: "<yellow>You have already completed HeadHunting.</yellow>"

reward:
  received: "<green>Received level <level> reward: <reward>.</green>"
  inventory-full: "<red>Make room in your inventory, then reopen the level menu to claim pending rewards.</red>"
  failed: "<red>A configured reward could not be delivered. An administrator can check the server log.</red>"

exchange:
  success: "<green>Exchange complete: <reward>.</green>"
  insufficient-heads: "<red>You do not have the required authentic heads.</red>"
  insufficient-souls: "<red>You need <amount> Souls for this exchange.</red>"
  recovery-cancelled: "<yellow>An interrupted exchange was cancelled and its Souls were returned.</yellow>"
  recovery-finalized: "<yellow>An interrupted exchange was completed. Its reward is ready.</yellow>"
  basic_mask: "Basic Mask"
  charm: "HeadHunting Charm"
  legendary_mask: "Legendary Mask"

